# Render "Blueprint" file — lets you spin up the web service + database
# together by clicking "New +" -> "Blueprint" on Render and pointing it
# at this repo. You can also just click through the dashboard manually
# instead of using this file; both work.

databases:
  - name: nine-db
    plan: free
    databaseName: nine
    user: nine_user

services:
  - type: web
    name: nine-backend
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nine-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_ORIGIN
        value: http://localhost:5173
